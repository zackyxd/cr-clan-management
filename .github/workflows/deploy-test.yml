name: Deploy to Test Server

on:
  push:
    branches:
      - dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: discord_bot_test
          POSTGRES_USER: discord_bot
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present

      - name: Build application
        run: npm run build

      - name: Run database migrations
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: discord_bot_test
          PGUSER: discord_bot
          PGPASSWORD: test_password
          DATABASE_URL: postgresql://discord_bot:test_password@localhost:5432/discord_bot_test
        run: npm run migrate:test:up

      - name: Run tests
        env:
          NODE_ENV: test
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: discord_bot_test
          PGUSER: discord_bot
          PGPASSWORD: test_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          TOKEN: test_token
          CLIENT_ID: test_client_id
          CR_KEY: test_api_key
        run: npm test --if-present

  deploy:
    name: Deploy to Test Server
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: test
      url: http://${{ secrets.TEST_SERVER_HOST }}:3000/health

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TEST_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.TEST_SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to test server
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.TEST_SERVER_USER }}@${{ secrets.TEST_SERVER_HOST }} << 'ENDSSH'
            cd /opt/discord-bot
            ./deployment/deploy.sh test
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.TEST_SERVER_HOST }}:3000/health || exit 1

      - name: Cleanup SSH
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Deployment notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Test deployment successful!"
          else
            echo "❌ Test deployment failed!"
          fi
