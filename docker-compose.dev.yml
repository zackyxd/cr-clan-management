version: '3.8'

services:
  # Discord Bot - Development
  # Connects to your local PostgreSQL (not a container)
  bot-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cr-bot-dev
    restart: unless-stopped
    # Run as current user to avoid permission issues with logs
    user: '1000:1000'
    env_file:
      - .env.dev
    environment:
      # Connect to host's PostgreSQL instead of container
      PGHOST: host.docker.internal
      NODE_ENV: dev
    extra_hosts:
      # Allow container to reach host machine
      - 'host.docker.internal:host-gateway'
    volumes:
      # Mount source code for live reload (if you add nodemon later)
      - ./src:/app/src
      - ./migrations:/app/migrations
      - ./logs:/app/logs
    command: npx tsx src/bot.ts
