version: '3.8'

services:
  # Discord Bot - Production
  # Assumes you have an external PostgreSQL database
  bot-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cr-bot-prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: prod
    volumes:
      # Only mount logs, not source code
      - ./logs:/app/logs
    command: npx tsx src/bot.ts
