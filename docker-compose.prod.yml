# Docker Compose for PRODUCTION DEPLOYMENT
# This assumes PostgreSQL and Redis are running externally
# Run with: docker-compose -f docker-compose.prod.yml up -d
version: '3.8'

services:
  bot:
    image: discord-bot:latest
    container_name: discord-bot-prod
    restart: unless-stopped
    environment:
      NODE_ENV: prod
      # Database connection (should come from .env.prod)
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      # Redis connection
      REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # Discord credentials
      TOKEN: ${TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      CR_KEY: ${CR_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    env_file:
      - .env.prod
    ports:
      - "3000:3000"
    volumes:
      # Persist logs
      - /opt/discord-bot/logs:/app/logs:rw
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
