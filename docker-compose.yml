# Docker Compose for LOCAL DEVELOPMENT
# Run with: docker-compose up
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: discord-bot-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: discord_bot_dev
      POSTGRES_USER: discord_bot
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U discord_bot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: discord-bot-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: dev
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: discord_bot_dev
      PGUSER: discord_bot
      PGPASSWORD: dev_password_change_me
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Discord credentials (set these in .env.dev file)
      TOKEN: ${TOKEN}
      CLIENT_ID: ${CLIENT_ID}
      CR_KEY: ${CR_KEY}
      LOG_LEVEL: debug
    env_file:
      - .env.dev
    ports:
      - "3000:3000"
    volumes:
      # Mount logs for easy access
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_dev_data:
    name: discord_bot_postgres_dev
  redis_dev_data:
    name: discord_bot_redis_dev
